name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci --ignore-scripts
      - run: npx electron-rebuild -f -m .
      - run: npm run build
      - run: npx electron-builder --mac zip dmg --publish never
      - uses: actions/upload-artifact@v4
        with:
          name: mac
          path: |
            release/*.zip
            release/*.dmg

  build-win:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci --ignore-scripts
      - run: npx electron-rebuild -f -m .
      - run: npm run build
      - run: npx electron-builder --win nsis zip --publish never
      - uses: actions/upload-artifact@v4
        with:
          name: win
          path: |
            release/*.exe
            release/*.zip

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci --ignore-scripts
      - run: npx electron-rebuild -f -m .
      - run: npm run build
      - run: npx electron-builder --linux AppImage deb --publish never
      - uses: actions/upload-artifact@v4
        with:
          name: linux
          path: |
            release/*.AppImage
            release/*.deb

  release:
    needs: [build-mac, build-win, build-linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist

      - name: List all files
        run: find dist -type f

      - uses: softprops/action-gh-release@v2
        with:
          name: Jobotta ${{ github.ref_name }}
          files: dist/**/*
          body: |
            ## Jobotta ${{ github.ref_name }}

            | Platform | File | Requirements |
            |---|---|---|
            | **macOS** | `.dmg` or `.zip` | macOS 14+ (Sonoma). Apple Silicon & Intel. |
            | **Windows** | `.exe` installer | Windows 10/11 (64-bit). |
            | **Linux** | `.AppImage` or `.deb` | Ubuntu 20.04+, Debian, Fedora. |

            **macOS:** Unzip or open .dmg, drag to Applications. First launch: right-click → Open.
            **Windows:** Run the .exe. SmartScreen warning: click "More info" → "Run anyway".
            **Linux:** `chmod +x Jobotta-*.AppImage && ./Jobotta-*.AppImage` or `sudo dpkg -i *.deb`
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
